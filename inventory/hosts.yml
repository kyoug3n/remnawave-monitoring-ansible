---
all:
  children:
    panel:
      hosts:
        remnawave_panel:
          ansible_host: "192.168.1.1"  # unique from node ips
      vars:
        remnawave_panel_domain: "example.com"

    nodes:
      hosts:
        node_msk:  # unique
          ansible_host: "192.168.0.1"  # unique, must be different from panel ip
          node_name: "msk"  # unique, 3 chars minimum
          node_port: 2222  # avoid 22, 80, 443, 8443, 61000
          node_domain: "node.example.com" # unique
      
      vars:
        # ↓ do not change ↓
        node_address: "{{ ansible_host }}"
        panel_ip: "{{ hostvars[groups['panel'][0]]['ansible_host'] }}"
        remnawave_panel_domain: "{{ hostvars[groups['panel'][0]]['remnawave_panel_domain'] }}"
        monitoring_server_ip: "{{ hostvars[groups['monitoring'][0]]['ansible_host'] }}"
        # ↑ do not change ↑

    monitoring:
      hosts:
        monitoring_server:
          ansible_host: "192.168.2.1"  # unique from panel & node ips
      vars:
        monitoring_server_ip: "{{ ansible_host }}"

  vars:
    ssh_user: "root"
    ssh_key: "~/.ssh/id_ed25519"  # leave empty if using password
    ssh_password: ""              # leave empty if using key
    ansible_port: 22  # ssh port to connect to

    # ↓ do not change ↓
    ansible_user: "{{ ssh_user }}"
    ansible_ssh_private_key_file: "{{ ssh_key if ssh_key != '' else omit }}"
    ansible_ssh_pass: "{{ ssh_password if ssh_password != '' else omit }}"
    acmesh_port: 8443
    allowed_ports:
      - "{{ ansible_port }}"
      - 80
      - 443
    # ↑ do not change ↑