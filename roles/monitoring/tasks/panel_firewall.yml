---
- name: Install ufw-docker on panel
  block:
    - name: Check if ufw-docker is installed
      stat:
        path: /usr/local/bin/ufw-docker
      register: ufw_docker_bin

    - name: Download ufw-docker
      get_url:
        url: https://github.com/chaifeng/ufw-docker/raw/master/ufw-docker
        dest: /usr/local/bin/ufw-docker
        mode: '0755'
      when: not ufw_docker_bin.stat.exists

    - name: Check if ufw-docker rules are installed
      shell: grep -q "BEGIN UFW AND DOCKER" /etc/ufw/after.rules
      register: ufw_docker_rules
      changed_when: false
      failed_when: false

    - name: Install ufw-docker rules
      shell: ufw-docker install
      when: ufw_docker_rules.rc != 0
      register: ufw_docker_install

    - name: Restart ufw to apply ufw-docker rules
      systemd:
        name: ufw
        state: restarted
      when: ufw_docker_install is changed
  delegate_to: "{{ groups['panel'][0] }}"

- name: Add fixed subnet to remnawave-network in docker-compose
  shell: |
    if ! grep -q 'subnet: 172.20.0.0/24' /opt/remnawave/docker-compose.yml; then
      sed -i '/    name: remnawave-network/a\    ipam:\n      config:\n        - subnet: 172.20.0.0/24' /opt/remnawave/docker-compose.yml
      echo changed
    else
      echo ok
    fi
  delegate_to: "{{ groups['panel'][0] }}"
  register: subnet_added
  changed_when: "'changed' in subnet_added.stdout"

- name: Bring nginx down before recreating network
  shell:
    cmd: docker compose down
    chdir: /opt/remnawave/nginx
  delegate_to: "{{ groups['panel'][0] }}"
  when: subnet_added is changed

- name: Restart remnawave to recreate network
  shell:
    cmd: docker compose down && docker compose up -d
    chdir: /opt/remnawave
  delegate_to: "{{ groups['panel'][0] }}"
  when: subnet_added is changed

- name: Bring nginx back up
  shell:
    cmd: docker compose up -d
    chdir: /opt/remnawave/nginx
  delegate_to: "{{ groups['panel'][0] }}"
  when: subnet_added is changed

- name: Allow nginx HTTPS port via ufw-docker
  shell: ufw-docker allow remnawave-nginx 443
  delegate_to: "{{ groups['panel'][0] }}"
  changed_when: false
  when: subnet_added is changed
